name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Harmless build-time placeholders — no real secrets. AI tests are
      # mocked (see lib/*.test.ts), so a fake OPENAI_API_KEY never gets used
      # for a real call; the Supabase values only need to be well-formed for
      # the client to construct without throwing during the build.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: placeholder-publishable-key
      OPENAI_API_KEY: sk-placeholder-ci-key
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: placeholder.apps.googleusercontent.com
      NEXT_PUBLIC_VAPID_KEY: placeholder-vapid-key
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
