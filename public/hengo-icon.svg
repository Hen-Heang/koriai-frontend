<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hengo app icon — the "ascending H" mark, 2026 brand refresh: white left
       stem, blue→violet gradient right stem (still rising above the left to
       signal growth), lavender crossbar tucked behind it, and a four-point
       spark above the left stem. Same construction grid as the previous flat
       mark (48-unit grid scaled 21.33x): left stem x15 y16 w6 h22 rx3, right
       stem x27 y6 w6 h32 rx3, crossbar x15 y24 w18 h6 rx3, stems
       bottom-aligned at y38. Matches public/new-app-logo.png (full lockup). -->
  <defs>
    <linearGradient id="hengo-right" x1="640" y1="128" x2="640" y2="811" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7FB3FA"/>
      <stop offset="0.55" stop-color="#6D7BF6"/>
      <stop offset="1" stop-color="#8B5CF6"/>
    </linearGradient>
    <linearGradient id="hengo-left" x1="384" y1="342" x2="384" y2="811" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E6E7F3"/>
    </linearGradient>
    <linearGradient id="hengo-bar" x1="320" y1="576" x2="704" y2="576" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#E9EAF7"/>
      <stop offset="1" stop-color="#A9A2EE"/>
    </linearGradient>
  </defs>

  <!-- Full-bleed ink background (safe for iOS masking + PWA maskable) -->
  <rect width="1024" height="1024" rx="233" fill="#080D1B"/>

  <!-- Spark -->
  <path d="M296 202c10 44 18 52 62 62-44 10-52 18-62 62-10-44-18-52-62-62 44-10 52-18 62-62Z" fill="#4D8DF7"/>

  <!-- Left stem -->
  <rect x="320" y="342" width="128" height="469" rx="64" fill="url(#hengo-left)"/>
  <!-- Crossbar (tucks behind the right stem) -->
  <rect x="320" y="512" width="384" height="128" rx="64" fill="url(#hengo-bar)"/>
  <!-- Right stem — rises higher than the left -->
  <rect x="576" y="128" width="128" height="683" rx="64" fill="url(#hengo-right)"/>
</svg>
