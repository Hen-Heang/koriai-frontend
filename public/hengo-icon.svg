<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hengo app icon — the "ascending H" mark. Flat ink badge with two vertical
       strokes and a crossbar; the right stroke rises above the left to signal
       growth without an arrowhead or gradient. Drawn on a 48-unit grid scaled
       21.33x. Construction: left stem x15 y16 w6 h22 rx3, right stem x27 y6 w6
       h32 rx3, crossbar x15 y24 w18 h6 rx3, both stems bottom-aligned at y38. -->

  <!-- Full-bleed ink background (safe for iOS masking + PWA maskable) -->
  <rect width="1024" height="1024" rx="233" fill="#10131A"/>

  <!-- Left stem -->
  <rect x="320" y="342" width="128" height="469" rx="64" fill="#F6F7F9"/>
  <!-- Right stem — rises higher than the left -->
  <rect x="576" y="128" width="128" height="683" rx="64" fill="#F6F7F9"/>
  <!-- Crossbar -->
  <rect x="320" y="512" width="384" height="128" rx="64" fill="#F6F7F9"/>
</svg>
