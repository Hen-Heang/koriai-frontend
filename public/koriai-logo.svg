<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 
    KoriAI Modern Logo
    A clean, high-end geometric mark representing the 'ㄱ' (Gi-yeok) 
    with an AI 'Spark' element.
  -->
  
  <!-- Subtle Gradient Background (Optional, but kept clean) -->
  <rect width="256" height="256" rx="64" fill="transparent"/>

  <!-- The "ㄱ" Mark -->
  <path d="M70 80H186V176" stroke="url(#logo_grad)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- AI Spark / Connectivity Node -->
  <circle cx="186" cy="80" r="22" fill="url(#spark_grad)" shadow="0 4px 12px rgba(16,185,129,0.4)"/>
  <circle cx="186" cy="80" r="10" fill="white"/>

  <!-- Accent Detail -->
  <path d="M110 120H156" stroke="white" stroke-width="8" stroke-linecap="round" opacity="0.3"/>

  <defs>
    <!-- Modern vibrant gradient for the main mark -->
    <linearGradient id="logo_grad" x1="70" y1="80" x2="186" y2="176" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981"/> <!-- Emerald 500 -->
      <stop offset="100%" stop-color="#0EA5E9"/> <!-- Sky 500 -->
    </linearGradient>

    <!-- Sparkle gradient -->
    <radialGradient id="spark_grad" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(186 80) rotate(90) scale(22)">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#059669"/>
    </radialGradient>
  </defs>
</svg>
